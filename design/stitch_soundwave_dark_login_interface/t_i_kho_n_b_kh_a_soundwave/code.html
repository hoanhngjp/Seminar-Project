            box-shadow: rgb(18,18,18) 0px 1px 0px, rgb(124,124,124) 0px 0px 0px 1px inset;

<body class="min-h-screen flex flex-col antialiased">
<!-- Top Navigation (Suppressed for Transactional Intent but keeping minimal brand presence) -->
<header class="bg-near-black flex justify-between items-center w-full px-lg py-md max-w-none">
<div class="font-section-title text-section-title font-bold text-text-base flex items-center gap-sm">
<span class="material-symbols-outlined text-spotify-green" style="font-variation-settings: 'FILL' 1;">graphic_eq</span>
            SoundWave
        </div>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow flex items-center justify-center p-md">
<div class="w-full max-w-md bg-dark-surface rounded-[8px] p-xl relative overflow-hidden" style="box-shadow: rgba(0,0,0,0.5) 0px 8px 24px;">
<!-- Background Decorative Blur -->
<div class="absolute -top-32 -right-32 w-64 h-64 bg-spotify-green rounded-full mix-blend-screen filter blur-[100px] opacity-20 pointer-events-none"></div>
<div class="text-center mb-xl relative z-10">
<h1 class="font-section-title text-section-title text-text-base mb-sm">Log in to SoundWave</h1>
<p class="font-body-regular text-body-regular text-text-secondary">Welcome back to the music.</p>
</div>
<!-- Account Locked Banner -->
<div class="locked-banner p-md rounded-r-md mb-xl relative z-10 flex items-start gap-md">
<span class="material-symbols-outlined text-negative" style="font-variation-settings: 'FILL' 1;">lock</span>
<p class="text-negative font-caption text-caption">
                    Tài khoản tạm khóa do đăng nhập sai quá 5 lần. Vui lòng thử lại sau.
                </p>
</div>
<form class="space-y-lg relative z-10">
<!-- Email Input -->
<div class="space-y-xs">
<label class="block font-small-bold text-small-bold text-text-base" for="email">Email or username</label>
<input class="w-full bg-mid-dark text-text-base font-body-regular text-body-regular rounded-full py-md px-lg focus:outline-none focus:ring-2 focus:ring-spotify-green inset-shadow-input border-none placeholder:text-text-secondary disabled:opacity-50" disabled="" id="email" placeholder="Email or username" type="email"/>
</div>
<!-- Password Input -->
<div class="space-y-xs">
<label class="block font-small-bold text-small-bold text-text-base" for="password">Password</label>
<input class="w-full bg-mid-dark text-text-base font-body-regular text-body-regular rounded-full py-md px-lg focus:outline-none focus:ring-2 focus:ring-spotify-green inset-shadow-input border-none placeholder:text-text-secondary disabled:opacity-50" disabled="" id="password" placeholder="Password" type="password"/>
</div>
<!-- Remember Me & Forgot Password -->
<div class="flex items-center justify-between">
<label class="flex items-center gap-sm cursor-not-allowed">
<input class="w-5 h-5 rounded-[4px] bg-mid-dark border-border-pill text-spotify-green focus:ring-spotify-green focus:ring-offset-dark-surface focus:ring-offset-2 disabled:opacity-50" disabled="" type="checkbox"/>
<span class="font-caption text-caption text-text-secondary">Remember me</span>
</label>
<a class="font-caption text-caption text-text-base hover:text-spotify-green transition-colors underline opacity-50 pointer-events-none" href="#">Forgot password?</a>
</div>
<!-- Submit Button -->
<button class="w-full bg-mid-dark text-text-base font-button-uppercase text-button-uppercase py-md px-lg rounded-full border border-border-pill opacity-50 cursor-not-allowed uppercase tracking-[1.4px]" disabled="" type="submit">
                    Log In
                </button>
</form>
<!-- Divider -->
<div class="mt-xl mb-lg flex items-center gap-md relative z-10 opacity-50">
<div class="h-[1px] bg-border-muted flex-grow"></div>
<span class="font-caption text-caption text-text-secondary">OR</span>
<div class="h-[1px] bg-border-muted flex-grow"></div>
</div>
<!-- Social Logins -->
<div class="space-y-md relative z-10 opacity-50">
<button class="w-full bg-transparent border border-border-pill text-text-base font-button-uppercase text-button-uppercase py-md px-lg rounded-full flex items-center justify-center gap-sm cursor-not-allowed" disabled="">
<span class="material-symbols-outlined">g_mobiledata</span>
                    Continue with Google
                </button>
<button class="w-full bg-transparent border border-border-pill text-text-base font-button-uppercase text-button-uppercase py-md px-lg rounded-full flex items-center justify-center gap-sm cursor-not-allowed" disabled="">
<span class="material-symbols-outlined">ios</span>
                    Continue with Apple
                </button>
</div>
<!-- Sign Up Prompt -->
<div class="mt-xl text-center relative z-10">
<p class="font-caption text-caption text-text-secondary">
                    Don't have an account? 
                    <a class="text-text-base hover:text-spotify-green font-body-bold text-body-bold transition-colors underline ml-sm" href="#">Sign up for SoundWave</a>
</p>
</div>
</div>
</main>
<!-- Footer -->
<footer class="bg-near-black flex flex-col md:flex-row justify-between items-center w-full px-lg py-xl gap-md mt-auto">
<div class="font-section-title text-section-title text-text-base">
            SoundWave
        </div>
<div class="flex gap-lg">
<a class="font-caption text-caption text-text-secondary hover:text-text-base underline opacity-80 hover:opacity-100" href="#">Support</a>
<a class="font-caption text-caption text-text-secondary hover:text-text-base underline opacity-80 hover:opacity-100" href="#">Privacy</a>
<a class="font-caption text-caption text-text-secondary hover:text-text-base underline opacity-80 hover:opacity-100" href="#">Terms</a>
</div>
<div class="font-caption text-caption text-text-secondary">
            © 2024 SoundWave. All rights reserved.
        </div>
</footer>
