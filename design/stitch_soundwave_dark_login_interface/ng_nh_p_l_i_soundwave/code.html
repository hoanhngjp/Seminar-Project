<body class="bg-near-black text-text-base font-body-regular min-h-screen flex flex-col justify-center items-center p-md">
<!-- Main Login Container -->
<main class="w-full max-w-[480px] flex flex-col items-center">
<!-- Brand / Logo Area -->
<div class="mb-xl text-center">
<h1 class="font-section-title text-section-title font-bold tracking-tight">SoundWave</h1>
</div>
<!-- Login Card -->
<div class="bg-dark-surface w-full rounded-lg p-xl shadow-[0_8px_24px_rgba(0,0,0,0.5)] border border-border-muted/20">
<h2 class="font-section-title text-section-title font-bold text-center mb-xl text-text-base">Log in to SoundWave</h2>
<form class="flex flex-col gap-lg">
<!-- Email Input Group (ERROR STATE) -->
<div class="flex flex-col gap-sm">
<label class="font-body-bold text-body-bold text-text-base" for="email">Email or username</label>
<div class="relative">
<!-- Input field with error border styling -->
<input class="w-full bg-mid-dark border-2 border-negative rounded-[4px] px-md py-md text-text-base font-body-regular text-body-regular focus:outline-none focus:border-negative shadow-[inset_0px_1px_2px_rgba(0,0,0,0.3)] transition-colors" id="email" name="email" placeholder="Email or username" type="text" value="invalid.user@example.com"/>
</div>
<!-- Error Message -->
<div class="flex items-center gap-xs mt-xs text-negative">
<span class="material-symbols-outlined text-[16px]" style="font-variation-settings: 'FILL' 1;">warning</span>
<span class="font-small-bold text-small-bold">Email hoặc mật khẩu không đúng</span>
</div>
</div>
<!-- Password Input Group -->
<div class="flex flex-col gap-sm">
<label class="font-body-bold text-body-bold text-text-base" for="password">Password</label>
<div class="relative">
<input class="w-full bg-mid-dark border border-border-muted rounded-[4px] px-md py-md text-text-base font-body-regular text-body-regular hover:border-[#7c7c7c] focus:outline-none focus:border-text-base shadow-[inset_0px_1px_2px_rgba(0,0,0,0.3)] transition-colors" id="password" name="password" placeholder="Password" type="password"/>
<!-- Optional: Eye icon for password visibility -->
<button class="absolute right-md top-1/2 -translate-y-1/2 text-text-secondary hover:text-text-base focus:outline-none" type="button">
<span class="material-symbols-outlined">visibility_off</span>
</button>
</div>
</div>
<!-- Remember Me Toggle -->
<div class="flex items-center gap-sm mt-xs">
<div class="relative flex items-center">
<input class="peer sr-only" id="remember" type="checkbox"/>
<div class="w-10 h-6 bg-mid-dark border border-border-muted rounded-full peer-checked:bg-spotify-green peer-checked:border-spotify-green transition-colors cursor-pointer relative">
<div class="absolute left-1 top-1 w-4 h-4 bg-text-secondary rounded-full peer-checked:translate-x-4 peer-checked:bg-near-black transition-transform"></div>
</div>
</div>
<label class="font-body-regular text-body-regular text-text-secondary cursor-pointer hover:text-text-base transition-colors" for="remember">Remember me</label>
</div>
<!-- Submit Button -->
<button class="w-full mt-md bg-spotify-green text-near-black font-button-uppercase text-button-uppercase py-[14px] rounded-full hover:scale-[1.02] hover:bg-[#34e36a] active:scale-[0.98] transition-all duration-200" type="button">
                    LOG IN
                </button>
</form>
<div class="mt-lg text-center font-caption text-caption">
<a class="text-text-base hover:underline hover:text-spotify-green transition-colors" href="#">Forgot your password?</a>
</div>
<!-- Divider -->
<div class="w-full h-px bg-border-muted/30 my-lg"></div>
<!-- Sign Up Prompt -->
<div class="text-center">
<p class="font-body-regular text-body-regular text-text-secondary mb-md">Don't have an account?</p>
<button class="w-full bg-transparent border border-border-muted text-text-base font-button-uppercase text-button-uppercase py-[14px] rounded-full hover:border-text-base transition-colors" type="button">
                    SIGN UP FOR SOUNDWAVE
                </button>
</div>
</div>
