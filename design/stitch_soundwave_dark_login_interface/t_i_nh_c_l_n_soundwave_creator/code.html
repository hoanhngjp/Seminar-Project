<body class="bg-near-black text-text-base font-body-regular min-h-screen flex">
<!-- SideNavBar (Suppressed as per rules for transactional/upload page) -->
<!-- Main Content Canvas -->
<main class="flex-1 overflow-y-auto">
<div class="max-w-[720px] mx-auto px-lg py-xl">
<!-- HEADER -->
<header class="mb-lg">
<h1 class="font-section-title text-section-title text-text-base mb-sm flex items-center gap-sm">
<span class="material-symbols-outlined" data-icon="upload" data-weight="fill" style="font-variation-settings: 'FILL' 1;">upload</span>
                    Tải nhạc lên
                </h1>
<p class="font-caption text-caption text-text-secondary">Chia sẻ âm nhạc của bạn với thế giới</p>
</header>
<form class="flex flex-col gap-lg">
<!-- SECTION 1 - File Upload -->
<section class="bg-dark-surface rounded-[8px] p-xl">
<div class="border-2 border-dashed border-border-muted rounded-[8px] p-[48px] flex flex-col items-center justify-center text-center hover:bg-[#1f1f1f] transition-colors cursor-pointer">
<span class="material-symbols-outlined text-[48px] text-text-secondary mb-md" data-icon="music_note">music_note</span>
<h2 class="font-body-bold text-body-bold text-text-base mb-lg">Kéo thả file nhạc vào đây</h2>
<button class="font-button-uppercase text-button-uppercase text-text-base bg-transparent border border-border-pill rounded-full px-lg py-md hover:border-text-base hover:text-text-emphasis transition-colors" type="button">
                            CHỌN FILE
                        </button>
</div>
</section>
<!-- SECTION 2 - Metadata -->
<section class="bg-dark-surface rounded-[8px] p-lg flex flex-col gap-lg">
<div class="grid grid-cols-1 md:grid-cols-2 gap-lg">
<div class="flex flex-col gap-sm">
<label class="font-small-bold text-small-bold text-text-secondary">Tên bài hát</label>
<input class="w-full bg-mid-dark rounded-full px-md py-sm font-body-regular text-body-regular text-text-base inset-input-shadow border-none focus:ring-0 focus:outline-none" placeholder="Nhập tên bài hát" type="text"/>
</div>
<div class="flex flex-col gap-sm">
<label class="font-small-bold text-small-bold text-text-secondary">Thể loại</label>
<input class="w-full bg-mid-dark rounded-full px-md py-sm font-body-regular text-body-regular text-text-base inset-input-shadow border-none focus:ring-0 focus:outline-none" placeholder="VD: Pop, Rock, Rap" type="text"/>
</div>
<div class="flex flex-col gap-sm">
<label class="font-small-bold text-small-bold text-text-secondary">Tâm trạng</label>
<input class="w-full bg-mid-dark rounded-full px-md py-sm font-body-regular text-body-regular text-text-base inset-input-shadow border-none focus:ring-0 focus:outline-none" placeholder="Vui vẻ, Buồn, Sôi động" type="text"/>
</div>
<div class="flex flex-col gap-sm">
<label class="font-small-bold text-small-bold text-text-secondary">Ngôn ngữ</label>
<input class="w-full bg-mid-dark rounded-full px-md py-sm font-body-regular text-body-regular text-text-base inset-input-shadow border-none focus:ring-0 focus:outline-none" placeholder="Tiếng Việt" type="text"/>
</div>
</div>
<div class="flex items-start gap-lg border-t border-border-muted pt-lg mt-sm">
<div class="flex flex-col gap-sm w-full md:w-auto">
<label class="font-small-bold text-small-bold text-text-secondary">Bìa album</label>
<div class="w-[120px] h-[120px] border-2 border-dashed border-border-muted rounded-[8px] flex items-center justify-center hover:bg-[#1f1f1f] cursor-pointer transition-colors bg-mid-dark">
<span class="material-symbols-outlined text-text-secondary" data-icon="add_photo_alternate">add_photo_alternate</span>
</div>
</div>
<div class="flex-1 flex flex-col justify-center h-[120px]">
<div class="flex items-center justify-between p-md bg-mid-dark rounded-[8px]">
<div class="flex items-center gap-sm">
<span class="material-symbols-outlined text-text-secondary" data-icon="warning">warning</span>
<span class="font-body-regular text-body-regular text-text-base">🔞 Nội dung người lớn (Explicit)</span>
</div>
<!-- Toggle Switch -->
<label class="relative inline-flex items-center cursor-pointer">
<input class="sr-only peer" type="checkbox" value=""/>
<div class="w-11 h-6 bg-border-muted peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-spotify-green"></div>
</label>
</div>
</div>
</div>
</section>
<!-- SECTION 3 - Preview -->
<section class="bg-dark-card rounded-[8px] p-md shadow-[rgba(0,0,0,0.3)_0px_8px_8px]">
<div class="font-micro text-micro text-text-secondary mb-md tracking-widest">XEM TRƯỚC</div>
<div class="flex items-center justify-between bg-mid-dark rounded-[8px] p-sm">
<div class="flex items-center gap-md">
<div class="w-12 h-12 bg-[#2a2a2a] rounded-[4px] flex items-center justify-center">
<span class="material-symbols-outlined text-text-secondary" data-icon="music_note">music_note</span>
</div>
<div class="flex flex-col">
<span class="font-body-bold text-body-bold text-text-base">Tên bài hát</span>
<span class="font-caption text-caption text-text-secondary">Tên nghệ sĩ</span>
</div>
</div>
<button class="w-10 h-10 bg-spotify-green rounded-full flex items-center justify-center text-near-black hover:scale-105 transition-transform" type="button">
<span class="material-symbols-outlined" data-icon="play_arrow" data-weight="fill" style="font-variation-settings: 'FILL' 1;">play_arrow</span>
</button>
</div>
</section>
<!-- SUBMIT -->
<div class="flex flex-col items-center gap-md mt-md">
<button class="w-full bg-spotify-green text-near-black font-button-uppercase text-button-uppercase rounded-full py-lg hover:brightness-110 active:scale-[0.98] transition-all" type="submit">
                        TẢI LÊN
                    </button>
<a class="font-caption text-caption text-text-secondary hover:text-text-base transition-colors" href="#">Hủy</a>
</div>
</form>
</div>
</main>
</body></html>
