<!DOCTYPE html>

<html class="dark" lang="vi"><head>
<meta charset="utf-8"/>

                        "on-tertiary-container": "#793820",
                        "on-secondary": "#313030",

                        "text-secondary": "#b3b3b3",
                        "on-error": "#690005",
                        "warning": "#ffa42b",
                        "primary-fixed": "#69ff89",
                        "surface-container-low": "#151e15",
                        "secondary-fixed": "#e5e2e1",

<style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>

<body class="bg-near-black min-h-screen flex items-center justify-center p-md">
<!-- Registration Card -->
<div class="bg-dark-surface rounded-card p-[48px] w-full max-w-[480px] shadow-level-3 flex flex-col gap-[32px]">
<!-- Header -->
<header class="flex flex-col items-center">
<div class="flex items-center gap-sm text-text-base">
<span class="material-symbols-outlined text-[32px]" style="font-variation-settings: 'FILL' 1;">music_note</span>
<h1 class="font-section-title text-section-title">SoundWave</h1>
</div>
<h2 class="font-feature-heading text-feature-heading text-text-base mt-sm">Tạo tài khoản miễn phí</h2>
</header>
<!-- Form -->
<form class="flex flex-col gap-md">
<!-- Họ và tên -->
<div class="flex flex-col gap-xs">
<label class="font-body-bold text-[14px] text-text-base" for="fullname">Họ và tên</label>
<input class="bg-mid-dark rounded-full py-[12px] px-lg text-text-base placeholder-text-secondary w-full focus:outline-none shadow-input-inset font-body-regular text-body-regular" id="fullname" placeholder="Nguyễn Văn A" type="text"/>
</div>
<!-- Email -->
<div class="flex flex-col gap-xs">
<label class="font-body-bold text-[14px] text-text-base" for="email">Email</label>
<input class="bg-mid-dark rounded-full py-[12px] px-lg text-text-base placeholder-text-secondary w-full focus:outline-none shadow-input-inset font-body-regular text-body-regular" id="email" placeholder="email@example.com" type="email"/>
</div>
<!-- Mật khẩu -->
<div class="flex flex-col gap-xs">
<label class="font-body-bold text-[14px] text-text-base" for="password">Mật khẩu</label>
<div class="relative w-full">
<input class="bg-mid-dark rounded-full py-[12px] pl-lg pr-[48px] text-text-base placeholder-text-secondary w-full focus:outline-none shadow-input-inset font-body-regular text-body-regular" id="password" placeholder="Tối thiểu 8 ký tự" type="password"/>
<button class="absolute right-lg top-1/2 -translate-y-1/2 text-text-secondary hover:text-text-base transition-colors" type="button">
<span class="material-symbols-outlined">visibility</span>
</button>
</div>
<!-- Password Strength -->
<div class="flex items-center gap-sm mt-xs px-sm">
<div class="h-[4px] w-full bg-mid-dark rounded-full overflow-hidden flex">
<div class="h-full bg-spotify-green w-full"></div>
</div>
<span class="text-spotify-green font-small-bold text-[12px]">Mạnh</span>
</div>
</div>
<!-- Xác nhận mật khẩu -->
<div class="flex flex-col gap-xs">
<label class="font-body-bold text-[14px] text-text-base" for="confirm-password">Xác nhận mật khẩu</label>
<div class="relative w-full">
<input class="bg-mid-dark rounded-full py-[12px] pl-lg pr-[48px] text-text-base placeholder-text-secondary w-full focus:outline-none shadow-input-inset font-body-regular text-body-regular" id="confirm-password" placeholder="Nhập lại mật khẩu" type="password" value="password123!"/>
<span class="material-symbols-outlined absolute right-lg top-1/2 -translate-y-1/2 text-spotify-green" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
</div>
<!-- Vai trò -->
<div class="flex flex-col gap-xs">
<label class="font-body-bold text-[14px] text-text-base">Bạn là:</label>
<div class="flex gap-sm w-full">
<button class="flex-1 bg-spotify-green text-near-black font-body-bold text-[14px] py-[10px] rounded-full flex items-center justify-center gap-xs" type="button">
                        🎧 Người nghe
                    </button>
<button class="flex-1 bg-mid-dark text-text-secondary font-body-bold text-[14px] py-[10px] rounded-full flex items-center justify-center gap-xs shadow-input-inset hover:text-text-base transition-colors" type="button">
                        🎵 Nghệ sĩ
                    </button>
</div>
</div>
<!-- Terms Checkbox -->
<div class="flex items-start gap-sm mt-sm">
<div class="relative flex items-center justify-center w-[16px] h-[16px] mt-[2px]">
<input checked="" class="appearance-none w-[16px] h-[16px] border border-border-pill rounded-[4px] bg-mid-dark checked:bg-spotify-green checked:border-spotify-green cursor-pointer" id="terms" type="checkbox"/>
<span class="material-symbols-outlined absolute text-near-black text-[14px] pointer-events-none" style="font-variation-settings: 'FILL' 1;">check</span>
</div>
<label class="font-caption text-[12px] text-text-secondary leading-tight cursor-pointer" for="terms">
                    Tôi đồng ý với <a class="text-spotify-green hover:underline" href="#">Điều khoản dịch vụ</a> và <a class="text-spotify-green hover:underline" href="#">Chính sách bảo mật</a>
</label>
</div>
<!-- Submit Button -->
<button class="w-full bg-spotify-green text-near-black font-button-uppercase text-button-uppercase rounded-full py-[14px] hover:scale-105 active:scale-95 transition-transform mt-sm" type="submit">
                TẠO TÀI KHOẢN
            </button>
</form>
<!-- Footer -->
<div class="text-center">
<p class="font-caption text-caption text-text-secondary">
                Đã có tài khoản? <a class="text-spotify-green hover:underline font-bold" href="#">Đăng nhập</a>
</p>
</div>
</div>
</body></html>
