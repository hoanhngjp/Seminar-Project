        .inset-input {
            box-shadow: rgb(18,18,18) 0px 1px 0px, rgb(124,124,124) 0px 0px 0px 1px inset;

<body class="bg-near-black text-text-base font-body-regular antialiased min-h-screen relative flex items-center justify-center">
<!-- Background App Elements (Blurred/Darkened) -->
<div class="fixed inset-0 bg-near-black pointer-events-none opacity-50 z-0"></div>
<div class="fixed left-0 top-0 h-full w-[240px] flex flex-col bg-near-black opacity-20 z-0 pointer-events-none"></div>
<!-- Overlay Background -->
<div class="fixed inset-0 bg-black/60 z-40 backdrop-blur-sm flex items-center justify-center p-md">
<!-- Modal Container -->
<div class="w-full max-w-[480px] bg-dark-surface rounded-[8px] shadow-[rgba(0,0,0,0.5)_0px_8px_24px] flex flex-col relative overflow-hidden z-50">
<!-- Header -->
<div class="flex items-center justify-between p-lg pb-md border-b border-border-muted/30">
<h2 class="font-section-title text-[20px] font-bold text-text-emphasis m-0">🎉 Tạo phòng nghe nhạc</h2>
<button class="text-text-secondary hover:text-text-emphasis transition-colors p-sm rounded-full hover:bg-mid-dark">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">close</span>
</button>
</div>
<!-- Content Area -->
<div class="p-lg flex flex-col gap-lg">
<!-- Room Name Input -->
<div class="flex flex-col gap-sm">
<label class="font-nav-link text-nav-link text-text-emphasis">Tên phòng</label>
<input class="w-full h-12 bg-mid-dark rounded-full px-lg text-text-base placeholder-text-secondary border-none focus:ring-1 focus:ring-border-pill inset-input outline-none font-body-regular text-body-regular transition-all" placeholder="Nhập tên phòng..." type="text"/>
</div>
<!-- First Song Search Input -->
<div class="flex flex-col gap-sm">
<label class="font-nav-link text-nav-link text-text-emphasis">Bài hát đầu tiên</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-md top-1/2 -translate-y-1/2 text-text-secondary">search</span>
<input class="w-full h-12 bg-mid-dark rounded-full pl-[48px] pr-lg text-text-base placeholder-text-secondary border-none focus:ring-1 focus:ring-border-pill inset-input outline-none font-body-regular text-body-regular transition-all" placeholder="Tìm bài hát…" type="text" value="Midnight"/>
</div>
</div>
<!-- Search Results -->
<div class="flex flex-col gap-xs mt-xs bg-mid-dark rounded-[8px] p-xs">
<!-- Result Row 1 -->
<button class="flex items-center gap-md p-sm rounded-[4px] hover:bg-[#282828] transition-colors w-full text-left group">
<span class="font-micro text-micro text-text-secondary w-4 text-center">1</span>
<img alt="Album Art" class="w-10 h-10 rounded-[4px] object-cover" data-alt="A moody, high-contrast photograph of a stylized vinyl record album cover floating in a dark void. The album art features abstract, glowing neon geometric shapes in deep blues and vibrant pinks, contrasting sharply with the pitch-black background. Soft, cinematic rim lighting highlights the edges of the square cover. The scene evokes a premium, intense, and atmospheric late-night listening session." src="https://lh3.googleusercontent.com/aida-public/AB6AXuAgLCfWt3p3KSR4Dj2xqGnugDcK8pf_xlud2NPYbvXL6ekvYF--yQbNRQUugo-05eNGss8uJETg8luNyLXpEKQHL7ebagwCT7tiLXOnt7bLywnqAkBtIcqGWIMoe_lAgelSkL4Q5pW4a0st6kOaJnzqkFXUgPjM6dNvjJqaMEusw_XD7nqPqdqpOsoBn4IXnAHdKI82PF4X80dQcaA0D10uCeCk13xj0COsI2Cmzr2gD688ibOVohHZ1UxKr9eY8Wc8jPu27IDKCuw"/>
<div class="flex flex-col flex-grow overflow-hidden">
<span class="font-body-regular text-body-regular text-text-base truncate group-hover:text-spotify-green transition-colors">Midnight City</span>
<span class="font-caption text-caption text-text-secondary truncate">M83</span>
</div>
</button>
<!-- Result Row 2 -->
<button class="flex items-center gap-md p-sm rounded-[4px] hover:bg-[#282828] transition-colors w-full text-left group">
<span class="font-micro text-micro text-text-secondary w-4 text-center">2</span>
<img alt="Album Art" class="w-10 h-10 rounded-[4px] object-cover" data-alt="A macro shot of a sleek, modern turntable stylus resting on a glossy black vinyl record. The lighting is low-key, heavily shadowed, with a single sharp spotlight illuminating the grooves of the record and the metallic arm. Deep, near-black shadows surround the focal point, emphasizing the tactile, mechanical nature of premium audio equipment. The aesthetic is sophisticated, dark, and highly focused." src="https://lh3.googleusercontent.com/aida-public/AB6AXuDXNdHQ39ucMo-PE4GS1RYH_0ccmsf88bvJkUyJEzT3vJ_RkwifFXmzAFW3e_QBp8MChNfScbYyFTv6sKxqhvEEFpdLEtfj6-hO_x9-0lzAXJnPkh9Qn_Cj1SEOxzJbxrC2HJaGLwrv9jtmbJpYpo3_oyly9WK4UatDvTwJUiyf5FLxNZU8BFWPsNqC9zPRjpgA_5mJMcCbPl_ptX_4RNNcdCGSwsSRONkHfemiLG-o3r3BIqG90YLsVw2zulD5u0hOjvHvX0TYvxc"/>
<div class="flex flex-col flex-grow overflow-hidden">
<span class="font-body-regular text-body-regular text-text-base truncate group-hover:text-spotify-green transition-colors">Midnight</span>
<span class="font-caption text-caption text-text-secondary truncate">Coldplay</span>
</div>
</button>
<!-- Result Row 3 -->
<button class="flex items-center gap-md p-sm rounded-[4px] hover:bg-[#282828] transition-colors w-full text-left group">
<span class="font-micro text-micro text-text-secondary w-4 text-center">3</span>
<img alt="Album Art" class="w-10 h-10 rounded-[4px] object-cover" data-alt="A stylized concert stage viewed from the perspective of an audience member standing in darkness. Bright, piercing laser lights in vivid greens and purples cut through thick atmospheric fog. The foreground is silhouetted, completely black, while the background pulses with energetic, glowing light against a stark black backdrop. The mood is electrifying, immersive, and captures the intense energy of a live audio performance." src="https://lh3.googleusercontent.com/aida-public/AB6AXuCFRtKEYXFMb3EEvJSeTry1pa3Up5F5ZKKXfsjzpl8M4juPYHG1qbwn3yFKTEvGnYs56LA8Blk56_ET5Y-xmH8KuWWwDd3TlISFlNH3vV9ow7pTcI6VdNpshkE-NPcBMhTYB4AimpnMi5Y_wStAIJnsapzElWwMWQK3mZMViV8VC27okrZmPzuDkQH1fnmG8hA9DXa8nxUbX3acKKhIHOMlUNdfvrHaavlTeH3TVCcab5ie8RmUgeihY1DnaP3wOs-z229D201uK1U"/>
<div class="flex flex-col flex-grow overflow-hidden">
<span class="font-body-regular text-body-regular text-text-base truncate group-hover:text-spotify-green transition-colors">Midnight Sky</span>
<span class="font-caption text-caption text-text-secondary truncate">Miley Cyrus</span>
</div>
</button>
</div>
</div>
<!-- Footer Actions -->
<div class="flex flex-col gap-md p-lg pt-sm">
<button class="w-full h-12 bg-spotify-green text-near-black rounded-full font-button-uppercase text-button-uppercase hover:bg-[#34e36a] transition-colors flex items-center justify-center tracking-[1.4px]">
                    TẠO PHÒNG
                </button>
<button class="w-full text-center text-text-secondary hover:text-text-emphasis font-body-bold text-body-bold transition-colors py-sm">
                    Hủy
                </button>
</div>
</div>
</div>
</body></html>
