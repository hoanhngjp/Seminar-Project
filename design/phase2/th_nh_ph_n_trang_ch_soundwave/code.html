<style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .material-symbols-outlined[data-weight="fill"] {
            font-variation-settings: 'FILL' 1;
        }
        
        /* Skeleton Shimmer */
        @keyframes shimmer {
            0% { background-position: -1000px 0; }
            100% { background-position: 1000px 0; }
        }
        .animate-shimmer {
            animation: shimmer 2s infinite linear;
            background: linear-gradient(to right, #282828 4%, #333333 25%, #282828 36%);
            background-size: 1000px 100%;
        }

        /* Hover effect for row */
        .song-row:hover .play-btn {
            opacity: 1;
            transform: scale(1);
        }
    </style>

<body class="bg-near-black text-text-base min-h-screen p-8 antialiased">
<div class="max-w-4xl mx-auto space-y-12">
<!-- Component 1: ContextSelector -->
<section aria-label="Context Selector">
<div class="flex flex-wrap gap-base">
<!-- Active Chip -->
<button class="bg-spotify-green text-black font-nav-link font-bold px-4 py-2 rounded-full whitespace-nowrap transition-transform hover:scale-105">
                    🌅 Buổi sáng
                </button>
<!-- Inactive Chips -->
<button class="bg-mid-dark text-text-secondary font-nav-link font-bold px-4 py-2 rounded-full whitespace-nowrap hover:bg-[#2a2a2a] transition-colors">
                    ☀️ Buổi chiều
                </button>
<button class="bg-mid-dark text-text-secondary font-nav-link font-bold px-4 py-2 rounded-full whitespace-nowrap hover:bg-[#2a2a2a] transition-colors">
                    🌙 Buổi tối
                </button>
<button class="bg-mid-dark text-text-secondary font-nav-link font-bold px-4 py-2 rounded-full whitespace-nowrap hover:bg-[#2a2a2a] transition-colors">
                    🌃 Đêm khuya
                </button>
</div>
</section>
<!-- Component 2: RecommendationFeed (Full State) -->

<!-- Header -->
<div class="flex items-center justify-between mb-6">
<h2 class="font-feature-heading text-text-base">Gợi ý cho bạn</h2>
<button aria-label="Refresh recommendations" class="bg-mid-dark w-10 h-10 rounded-full flex items-center justify-center hover:bg-[#2a2a2a] transition-colors">
<span class="material-symbols-outlined text-text-secondary" data-icon="refresh">refresh</span>
</button>
</div>
<!-- Feed List -->
<div class="flex flex-col">
<!-- Song Row 1 -->
<div class="song-row group flex items-center justify-between h-[64px] px-4 rounded-md hover:bg-mid-dark transition-colors cursor-pointer">
<div class="flex items-center gap-4 flex-1 overflow-hidden">
<!-- Album Art -->
<div class="w-[56px] h-[56px] rounded-[6px] overflow-hidden flex-shrink-0 bg-dark-card">
<img alt="Album cover" class="w-full h-full object-cover" data-alt="A macro, high-contrast photograph of an acoustic guitar's soundhole and strings resting in deep, moody lighting. The background is engulfed in pitch-black shadow, focusing intensely on the warm wood grain and metallic strings. Subtle reflections glint off the strings. The aesthetic is intimate, musical, and premium dark mode." src="https://lh3.googleusercontent.com/aida-public/AB6AXuDBps8QRpd4YfLdEK3wOSI6FuoDjBeLD7xpWMWJRIVHqbXNyG3y4GLH54z4nxKJCjKVWaT3C4EXlAdqeK8BSLAJWwa1k4WuzMXp9sWquuu5GD1NzMjGLwz16bk5BzJZd8JebBxJDXoTuTXebyLO5aKhxq_iDb9Mo22CaXs1nhR74g3YD1DqbKRUNKlZVAbTmn5UfHrI5MW_X8DUovrxtD00Zf--XO9-SASiT4nBp3RQi0_rkod8pFAW5me0DIuwxEK_ws4zOLs2uI8"/>
</div>
<!-- Track Info -->
<div class="flex flex-col overflow-hidden min-w-0">
<span class="font-body-bold text-text-base truncate">Cơn Mưa Ngang Qua</span>
<div class="flex items-center gap-2 mt-0.5">
<span class="bg-spotify-green/10 text-spotify-green font-small-bold px-2 py-0.5 rounded-full whitespace-nowrap text-[10px]">
                                    Vì bạn nghe nhiều Acoustic
                                </span>
<span class="font-caption text-text-secondary truncate">Sơn Tùng M-TP</span>
</div>
</div>
</div>
<!-- Right Actions -->
<div class="flex items-center gap-4 flex-shrink-0 pl-4">
<span class="font-caption text-text-secondary group-hover:hidden">3:45</span>
<button aria-label="Play song" class="play-btn w-8 h-8 rounded-full bg-spotify-green text-black flex items-center justify-center opacity-0 scale-95 transition-all shadow-[0_8px_8px_rgba(0,0,0,0.3)] hidden group-hover:flex">
<span class="material-symbols-outlined text-[20px]" data-icon="play_arrow" data-weight="fill">play_arrow</span>
</button>
</div>
</div>
<!-- Song Row 2 -->
<div class="song-row group flex items-center justify-between h-[64px] px-4 rounded-md hover:bg-mid-dark transition-colors cursor-pointer">

<div class="w-[56px] h-[56px] rounded-[6px] overflow-hidden flex-shrink-0 bg-dark-card">

</div>
<div class="flex flex-col overflow-hidden min-w-0">
<span class="font-body-bold text-text-base truncate">Chạy Ngay Đi</span>
<div class="flex items-center gap-2 mt-0.5">
<span class="font-caption text-text-secondary truncate">Sơn Tùng M-TP</span>
</div>
</div>
</div>
<div class="flex items-center gap-4 flex-shrink-0 pl-4">
<span class="font-caption text-text-secondary group-hover:hidden">4:05</span>
<button aria-label="Play song" class="play-btn w-8 h-8 rounded-full bg-spotify-green text-black flex items-center justify-center opacity-0 scale-95 transition-all shadow-[0_8px_8px_rgba(0,0,0,0.3)] hidden group-hover:flex">
<span class="material-symbols-outlined text-[20px]" data-icon="play_arrow" data-weight="fill">play_arrow</span>
</button>
</div>
</div>
</div>

<div class="flex items-center justify-between mb-6">
<h2 class="font-feature-heading text-text-base">Gợi ý cho bạn</h2>
</div>
<div class="flex flex-col items-center justify-center py-16 text-center space-y-4 bg-dark-surface rounded-xl">
<span class="material-symbols-outlined text-[40px] text-border-muted" data-icon="music_note">music_note</span>
<p class="font-caption text-text-secondary">Chưa có gợi ý — hãy cập nhật sở thích của bạn</p>
<button class="mt-2 px-6 py-2 rounded-full border border-border-pill text-text-base font-button-uppercase text-[12px] hover:border-text-base transition-colors">

</section>
</div>
