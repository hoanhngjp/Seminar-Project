syntax = "proto3";

package auth;

option csharp_namespace = "SmartMusic.Auth.Grpc";

import "google/protobuf/timestamp.proto";

// AuthService exposes the ValidateToken RPC used exclusively by the API Gateway.
// This is one of only two gRPC calls in the system (Auth hot path).
// Timeout budget: 50ms (Gateway → Auth leg of the 100ms total budget).
//
// gRPC Status Codes:
//   OK              — token is valid; response fields are populated
//   UNAUTHENTICATED — token is missing, malformed, expired, or blacklisted
//   UNAVAILABLE     — Redis blacklist is unreachable; caller should apply
//                     offline-mode fallback (local public-key JWT verification)
service AuthService {
  // ValidateToken validates a raw JWT Bearer token.
  // Called by API Gateway on every authenticated request.
  rpc ValidateToken(ValidateTokenRequest) returns (ValidateTokenResponse);
}

// ---------------------------------------------------------------------------
// Enums
// ---------------------------------------------------------------------------

// Role mirrors the RBAC roles defined in the Auth Service domain model.
// ROLE_UNSPECIFIED is the proto3 zero-value and MUST NOT be used in responses.
enum Role {
  ROLE_UNSPECIFIED = 0;
  LISTENER         = 1;
  CREATOR          = 2;
  ADMIN            = 3;
}

// ---------------------------------------------------------------------------
// Messages
// ---------------------------------------------------------------------------

// ValidateTokenRequest carries the raw JWT string (without the "Bearer " prefix).
message ValidateTokenRequest {
  // token is the raw JWT Bearer token extracted from the Authorization header.
  // The caller strips the "Bearer " prefix before sending.
  // Required. Must be non-empty.
  string token = 1;

  // correlation_id is propagated from the incoming HTTP request for distributed
  // tracing across the Gateway → Auth → User call chain.
  // Optional. When omitted a new UUID is generated by the Auth Service.
  string correlation_id = 2;
}

// ValidateTokenResponse is returned on a successful OK status.
// On any non-OK status the response message is empty; use the gRPC Status
// detail for error information.
message ValidateTokenResponse {
  // is_valid indicates whether the token passed all checks:
  //   • signature verification against the Auth Service public key
  //   • expiry check (exp claim)
  //   • Redis blacklist check (token not revoked)
  // A false value here is informational only; callers SHOULD also inspect the
  // gRPC status code. In practice the Auth Service returns UNAUTHENTICATED
  // instead of OK+is_valid=false, but consumers MUST handle both cases.
  bool is_valid = 1;

  // user_id is the subject (sub) UUID from the JWT claims.
  // Populated only when is_valid = true.
  string user_id = 2;

  // role is the RBAC role encoded in the JWT claims.
  // Populated only when is_valid = true.
  Role role = 3;

  // expires_at is the token expiry timestamp (exp claim) converted to UTC.
  // Populated only when is_valid = true.
  google.protobuf.Timestamp expires_at = 4;

  // correlation_id echoes (or generates) the tracing identifier so downstream
  // services can correlate log lines across the full request chain.
  string correlation_id = 5;
}
