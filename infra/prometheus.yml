global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'api-gateway'
    static_configs:
      - targets: ['api-gateway:80']
    metrics_path: /metrics

  - job_name: 'auth-service'
    static_configs:
      - targets: ['auth-service:80']
    metrics_path: /metrics

  - job_name: 'user-service'
    static_configs:
      - targets: ['user-service:80']
    metrics_path: /metrics

  - job_name: 'music-service'
    static_configs:
      - targets: ['music-service:80']
    metrics_path: /metrics

  - job_name: 'streaming-service'
    static_configs:
      - targets: ['streaming-service:80']
    metrics_path: /metrics

  - job_name: 'listening-party-service'
    static_configs:
      - targets: ['listening-party-service:80']
    metrics_path: /metrics

  - job_name: 'analytics-service'
    static_configs:
      - targets: ['analytics-service:80']
    metrics_path: /metrics

  - job_name: 'notification-service'
    static_configs:
      - targets: ['notification-service:80']
    metrics_path: /metrics

  - job_name: 'search-service'
    static_configs:
      - targets: ['search-service:80']
    metrics_path: /metrics

  - job_name: 'recommendation-service'
    static_configs:
      - targets: ['recommendation-service:8000']
    metrics_path: /metrics
