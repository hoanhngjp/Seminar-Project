version: "3.9"

# ============================================================
# Smart Music Streaming Platform Ă˘â‚¬â€ť Local Development
# ============================================================

networks:
  smartmusic-network:
    driver: bridge

volumes:
  pgdata:
  mongodata:
  redisdata:
  esdata:
  influxdata:
  miniodata:

services:

  # ===========================================================
  # INFRASTRUCTURE
  # ===========================================================

  postgres:
    image: postgres:16-alpine
    container_name: smartmusic-postgres
    ports:
      - "5434:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - smartmusic-network
    restart: unless-stopped

  mongodb:
    image: mongo:7
    container_name: smartmusic-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
    volumes:
      - mongodata:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - smartmusic-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: smartmusic-redis
    ports:
      - "6379:6379"
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - smartmusic-network
    restart: unless-stopped

  elasticsearch:
    image: elasticsearch:8.13.0
    container_name: smartmusic-elasticsearch
    ports:
      - "9200:9200"
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms256m -Xmx512m
    volumes:
      - esdata:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -vq '\"status\":\"red\"'"]
      interval: 15s
      timeout: 10s
      retries: 10
    mem_limit: 512m
    networks:
      - smartmusic-network
    restart: unless-stopped

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: smartmusic-zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - smartmusic-network
    restart: unless-stopped

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: smartmusic-kafka
    ports:
      - "9092:9092"
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 10
    networks:
      - smartmusic-network
    restart: unless-stopped

  influxdb:
    image: influxdb:2.7
    container_name: smartmusic-influxdb
    ports:
      - "8086:8086"
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: ${INFLUXDB_ADMIN_USERNAME}
      DOCKER_INFLUXDB_INIT_PASSWORD: ${INFLUXDB_ADMIN_PASSWORD}
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: ${INFLUXDB_TOKEN}
      DOCKER_INFLUXDB_INIT_ORG: ${INFLUXDB_ORG}
      DOCKER_INFLUXDB_INIT_BUCKET: ${INFLUXDB_BUCKET}
    volumes:
      - influxdata:/var/lib/influxdb2
    networks:
      - smartmusic-network
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: smartmusic-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${AWS_ACCESS_KEY_ID}
      MINIO_ROOT_PASSWORD: ${AWS_SECRET_ACCESS_KEY}
    volumes:
      - miniodata:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - smartmusic-network
    restart: unless-stopped

  # ===========================================================
  # DEVELOPER TOOLS
  # ===========================================================

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: smartmusic-kafka-ui
    ports:
      - "8080:8080"
    depends_on:
      - kafka
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
    networks:
      - smartmusic-network
    restart: unless-stopped

  mongo-express:
    image: mongo-express:latest
    container_name: smartmusic-mongo-express
    ports:
      - "8081:8081"
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: ${MONGO_USERNAME}
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${MONGO_PASSWORD}
      ME_CONFIG_MONGODB_URL: ${MONGO_URI}
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: ${MONGO_PASSWORD}
    networks:
      - smartmusic-network
    restart: unless-stopped

  # ===========================================================
  # APPLICATION SERVICES Ă˘â‚¬â€ť C# ASP.NET Core
  # ===========================================================

  api-gateway:
    build:
      context: ../services/api-gateway
      dockerfile: Dockerfile
    container_name: smartmusic-api-gateway
    ports:
      - "5000:80"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_HTTP_PORTS=80
      - Redis__ConnectionString=${REDIS_CONNECTION}
      - Jwt__SecretKey=${JWT_SECRET}
      - Services__AuthService=${AUTH_SERVICE_URL}
      - Services__UserService=${USER_SERVICE_URL}
      - Services__MusicService=${MUSIC_SERVICE_URL}
      - Services__StreamingService=${STREAMING_SERVICE_URL}
      - Services__ListeningPartyService=${LISTENING_PARTY_SERVICE_URL}
      - Services__AnalyticsService=${ANALYTICS_SERVICE_URL}
      - Services__NotificationService=${NOTIFICATION_SERVICE_URL}
      - Services__SearchService=${SEARCH_SERVICE_URL}
      - Services__RecommendationService=${RECOMMENDATION_SERVICE_URL}
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - smartmusic-network
    restart: unless-stopped

  auth-service:
    build:
      context: ../
      dockerfile: services/auth-service/Dockerfile
    container_name: smartmusic-auth-service
    ports:
      - "5001:80"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_HTTP_PORTS=80
      - ConnectionStrings__AuthDb=${AUTH_DB_CONNECTION}
      - Redis__ConnectionString=${REDIS_CONNECTION}
      - Jwt__SecretKey=${JWT_SECRET}
      - Jwt__AccessTokenExpiry=${JWT_ACCESS_TOKEN_EXPIRY}
      - Jwt__RefreshTokenExpiry=${JWT_REFRESH_TOKEN_EXPIRY}
      - Kafka__BootstrapServers=${KAFKA_BOOTSTRAP_SERVERS}
      - Grpc__UserService=http://user-service:5300
      - Google__ClientId=${GOOGLE_CLIENT_ID}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - smartmusic-network
    restart: unless-stopped

  user-service:
    build:
      context: ../
      dockerfile: services/user-service/Dockerfile
    container_name: smartmusic-user-service
    ports:
      - "5002:80"
      - "5300:5300"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_HTTP_PORTS=80
      - ConnectionStrings__Postgres=${USER_DB_CONNECTION}
      - ConnectionStrings__MongoDB=${MONGO_URI}
      - Redis__ConnectionString=${REDIS_CONNECTION}
      - Kafka__BootstrapServers=${KAFKA_BOOTSTRAP_SERVERS}
      - Aws__AccessKeyId=${AWS_ACCESS_KEY_ID}
      - Aws__SecretAccessKey=${AWS_SECRET_ACCESS_KEY}
      - Aws__S3Bucket=${AWS_S3_BUCKET}
      - Aws__S3Endpoint=${AWS_S3_ENDPOINT}
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - smartmusic-network
    restart: unless-stopped

  music-service:
    build:
      context: ../services/music-service
      dockerfile: Dockerfile
    container_name: smartmusic-music-service
    ports:
      - "5003:80"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_HTTP_PORTS=80
      - ConnectionStrings__DefaultConnection=${MUSIC_DB_CONNECTION}
      - ConnectionStrings__MongoDB=${MONGO_URI}
      - Redis__ConnectionString=${REDIS_CONNECTION}
      - Kafka__BootstrapServers=${KAFKA_BOOTSTRAP_SERVERS}
      - Elasticsearch__Url=${ELASTICSEARCH_URL}
      - GCP__ProjectId=${GCP_PROJECT_ID}
      - GCP__BucketName=${GCP_BUCKET_NAME}
      - GOOGLE_APPLICATION_CREDENTIALS=/app/secrets/google-cloud-key.json
      - Cloudinary__CloudName=${CLOUDINARY_CLOUD_NAME}
      - Cloudinary__ApiKey=${CLOUDINARY_API_KEY}
      - Cloudinary__ApiSecret=${CLOUDINARY_API_SECRET}
    volumes:
      - ../infra/secrets:/app/secrets:ro
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    networks:
      - smartmusic-network
    restart: unless-stopped

  streaming-service:
    build:
      context: ../services/streaming-service
      dockerfile: Dockerfile
    container_name: smartmusic-streaming-service
    ports:
      - "5004:80"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_HTTP_PORTS=80
      - ConnectionStrings__PostgreSQL=${STREAMING_DB_CONNECTION}
      - Redis__ConnectionString=${REDIS_CONNECTION}
      - Kafka__BootstrapServers=${KAFKA_BOOTSTRAP_SERVERS}
      - GCP__ProjectId=${GCP_PROJECT_ID}
      - GCP__BucketName=${GCP_BUCKET_NAME}
      - GOOGLE_APPLICATION_CREDENTIALS=/app/secrets/google-cloud-key.json
    volumes:
      - ../infra/secrets:/app/secrets:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - smartmusic-network
    restart: unless-stopped

  listening-party-service:
    build:
      context: ../services/listening-party-service
      dockerfile: Dockerfile
    container_name: smartmusic-listening-party-service
    ports:
      - "5005:80"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_HTTP_PORTS=80
      - ConnectionStrings__PostgreSQL=${LISTENING_PARTY_DB_CONNECTION}
      - Redis__ConnectionString=${REDIS_CONNECTION}
      - Kafka__BootstrapServers=${KAFKA_BOOTSTRAP_SERVERS}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - smartmusic-network
    restart: unless-stopped

  analytics-service:
    build:
      context: ../services/analytics-service
      dockerfile: Dockerfile
    container_name: smartmusic-analytics-service
    ports:
      - "5006:80"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_HTTP_PORTS=80
      - ConnectionStrings__PostgreSQL=${ANALYTICS_DB_CONNECTION}
      - Kafka__BootstrapServers=${KAFKA_BOOTSTRAP_SERVERS}
      - InfluxDB__Url=http://influxdb:8086
      - InfluxDB__Token=${INFLUXDB_TOKEN}
      - InfluxDB__Org=${INFLUXDB_ORG}
      - InfluxDB__Bucket=${INFLUXDB_BUCKET}
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      influxdb:
        condition: service_started
    networks:
      - smartmusic-network
    restart: unless-stopped

  notification-service:
    build:
      context: ../services/notification-service
      dockerfile: Dockerfile
    container_name: smartmusic-notification-service
    ports:
      - "5007:80"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_HTTP_PORTS=80
      - ConnectionStrings__PostgreSQL=${NOTIFICATION_DB_CONNECTION}
      - Redis__ConnectionString=${REDIS_CONNECTION}
      - Kafka__BootstrapServers=${KAFKA_BOOTSTRAP_SERVERS}
      - MongoDB__ConnectionString=${MONGO_URI}
      - MongoDB__Database=notification_db
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    networks:
      - smartmusic-network
    restart: unless-stopped

  search-service:
    build:
      context: ../services/search-service
      dockerfile: Dockerfile
    container_name: smartmusic-search-service
    ports:
      - "5008:80"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_HTTP_PORTS=80
      - Elasticsearch__Url=${ELASTICSEARCH_URL}
      - Kafka__BootstrapServers=${KAFKA_BOOTSTRAP_SERVERS}
      - Redis__ConnectionString=${REDIS_CONNECTION}
    depends_on:
      elasticsearch:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - smartmusic-network
    restart: unless-stopped

  # ===========================================================
  # APPLICATION SERVICES Ă˘â‚¬â€ť Python FastAPI
  # ===========================================================

  recommendation-service:
    build:
      context: ../services/recommendation-service
      dockerfile: Dockerfile
    container_name: smartmusic-recommendation-service
    ports:
      - "5009:8000"
    environment:
      - REDIS_URL=${REDIS_URL}
      - KAFKA_BOOTSTRAP_SERVERS=${KAFKA_BOOTSTRAP_SERVERS}
      - MUSIC_SERVICE_URL=http://music-service:80
      - USER_SERVICE_URL=http://user-service:80
      - PYTHONPATH=/app/src
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - smartmusic-network
    restart: unless-stopped

  # ===========================================================
  # OBSERVABILITY
  # ===========================================================

  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: smartmusic-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
    networks:
      - smartmusic-network
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.4.0
    container_name: smartmusic-grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    networks:
      - smartmusic-network
    restart: unless-stopped

  # ===========================================================
  # FRONTEND
  # ===========================================================

  frontend:
    build:
      context: ../services/frontend
      dockerfile: Dockerfile
    container_name: smartmusic-frontend
    ports:
      - "3000:3000"
    environment:
      - VITE_API_BASE_URL=http://localhost:5000
      - VITE_WS_URL=ws://localhost:5005
    volumes:
      - ../services/frontend/src:/app/src
      - ../services/frontend/public:/app/public
      - ../services/frontend/index.html:/app/index.html
      - ../services/frontend/vite.config.ts:/app/vite.config.ts
      - ../services/frontend/tailwind.config.ts:/app/tailwind.config.ts
    networks:
      - smartmusic-network
    restart: unless-stopped

